<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=400, height=600">
  <title>伴航 NavPal</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #3b82f6;
      --primary-dark: #2563eb;
      --primary-light: #60a5fa;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --bg-base: #f8fafc;
      --bg-card: #ffffff;
      --bg-elevated: #ffffff;
      --text-primary: #0f172a;
      --text-secondary: #64748b;
      --text-tertiary: #94a3b8;
      --border: #e2e8f0;
      --border-light: #f1f5f9;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
      --shadow-lg: 0 12px 32px rgba(0,0,0,0.12);
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-xl: 20px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'PingFang SC', sans-serif;
      background: linear-gradient(160deg, #667eea 0%, #764ba2 50%, #8b5cf6 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
      -webkit-font-smoothing: antialiased;
    }

    .device-frame {
      width: 380px;
      height: 580px;
      background: #0f172a;
      border-radius: 44px;
      padding: 12px;
      box-shadow: 
        0 0 0 1px rgba(255,255,255,0.1),
        0 25px 50px -12px rgba(0, 0, 0, 0.5),
        0 0 80px rgba(102, 126, 234, 0.3);
    }

    .screen {
      width: 100%;
      height: 100%;
      background: var(--bg-base);
      border-radius: 36px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    /* Status Bar */
    .status-bar {
      height: 44px;
      padding: 12px 24px 0;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      font-size: 14px;
      font-weight: 600;
      color: white;
      background: linear-gradient(160deg, #667eea 0%, #764ba2 100%);
    }

    .status-bar .time {
      font-weight: 600;
    }

    .status-icons {
      display: flex;
      gap: 4px;
      align-items: center;
    }

    /* App Header */
    .app-header {
      padding: 16px 20px 12px;
      background: linear-gradient(160deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .app-brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .app-logo {
      width: 36px;
      height: 36px;
      background: rgba(255,255,255,0.2);
      backdrop-filter: blur(10px);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(255,255,255,0.3);
    }

    .app-logo svg {
      width: 20px;
      height: 20px;
    }

    .app-title {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .app-subtitle {
      font-size: 11px;
      opacity: 0.8;
      margin-top: 1px;
    }

    .header-actions {
      display: flex;
      gap: 8px;
    }

    .header-btn {
      width: 36px;
      height: 36px;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      cursor: pointer;
      transition: all 0.2s;
    }

    .header-btn:hover {
      background: rgba(255,255,255,0.25);
      transform: scale(1.05);
    }

    .header-btn svg {
      width: 18px;
      height: 18px;
    }

    /* Search */
    .search-container {
      position: relative;
    }

    .search-input {
      width: 100%;
      padding: 12px 16px 12px 44px;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: var(--radius-lg);
      font-size: 15px;
      color: white;
      transition: all 0.2s;
    }

    .search-input::placeholder {
      color: rgba(255,255,255,0.6);
    }

    .search-input:focus {
      outline: none;
      background: rgba(255,255,255,0.25);
      border-color: rgba(255,255,255,0.4);
    }

    .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      width: 18px;
      height: 18px;
      color: rgba(255,255,255,0.6);
    }

    /* Language Toggle */
    .lang-toggle {
      display: inline-flex;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 20px;
      padding: 3px;
      margin-top: 12px;
    }

    .lang-toggle button {
      padding: 6px 14px;
      font-size: 12px;
      font-weight: 600;
      border: none;
      border-radius: 16px;
      cursor: pointer;
      transition: all 0.2s;
      color: rgba(255,255,255,0.7);
      background: transparent;
    }

    .lang-toggle button:hover {
      color: white;
    }

    .lang-toggle button.active {
      background: white;
      color: var(--primary);
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }

    /* Reveal Badge */
    .reveal-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 10px;
      font-size: 11px;
      font-weight: 600;
      background: rgba(255,255,255,0.2);
      backdrop-filter: blur(10px);
      color: white;
      border-radius: 20px;
      margin-left: 8px;
      animation: badgePulse 2s ease-in-out infinite;
    }

    @keyframes badgePulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }

    /* Category Tabs */
    .category-section {
      background: var(--bg-card);
      padding: 16px 0 0;
      border-bottom: 1px solid var(--border-light);
    }

    .category-scroll {
      display: flex;
      gap: 6px;
      padding: 0 16px;
      overflow-x: auto;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    .category-scroll::-webkit-scrollbar { display: none; }

    .category-tab {
      flex-shrink: 0;
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
      background: var(--bg-base);
      border: none;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .category-tab:hover {
      color: var(--text-primary);
      background: var(--border-light);
    }

    .category-tab.active {
      background: var(--text-primary);
      color: white;
    }

    .category-tab .icon {
      font-size: 14px;
    }

    .category-tab .count {
      font-size: 11px;
      padding: 2px 6px;
      background: rgba(0,0,0,0.08);
      border-radius: 10px;
    }

    .category-tab.active .count {
      background: rgba(255,255,255,0.2);
    }

    /* Main Content */
    .content {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }

    /* Quick Actions */
    .quick-actions {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
    }

    .quick-btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      font-size: 13px;
      font-weight: 600;
      color: var(--text-primary);
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: var(--shadow-sm);
    }

    .quick-btn:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
    }

    .quick-btn.primary {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      border: none;
      color: white;
    }

    .quick-btn.primary:hover {
      background: linear-gradient(135deg, var(--primary-dark) 0%, #1d4ed8 100%);
    }

    .quick-btn svg {
      width: 18px;
      height: 18px;
    }

    /* Bookmark Grid */
    .section-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .section-title .view-all {
      font-size: 12px;
      font-weight: 500;
      color: var(--primary);
      text-transform: none;
      letter-spacing: 0;
    }

    .bookmark-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    .bookmark-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px 8px 12px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      box-shadow: var(--shadow-sm);
    }

    .bookmark-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-lg);
      border-color: var(--primary-light);
    }

    .bookmark-card:active {
      transform: translateY(-2px) scale(0.98);
    }

    .bookmark-icon {
      width: 48px;
      height: 48px;
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 700;
      color: white;
      margin-bottom: 10px;
      position: relative;
      overflow: hidden;
    }

    .bookmark-icon::before {
      content: '';
      position: absolute;
      inset: 0;
      background: inherit;
      filter: brightness(0.9);
    }

    .bookmark-icon span {
      position: relative;
      z-index: 1;
    }

    .bookmark-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-primary);
      text-align: center;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      margin-bottom: 4px;
    }

    .bookmark-region {
      font-size: 10px;
      font-weight: 500;
      color: var(--text-tertiary);
    }

    /* Hidden item style */
    .bookmark-card.hidden {
      opacity: 0.5;
    }

    .bookmark-card.hidden .bookmark-icon {
      filter: grayscale(1);
    }

    .lock-indicator {
      position: absolute;
      top: 6px;
      right: 6px;
      width: 18px;
      height: 18px;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px);
      border-radius: 50%;
      display: none;
      align-items: center;
      justify-content: center;
    }

    .bookmark-card.hidden .lock-indicator {
      display: flex;
    }

    .lock-indicator svg {
      width: 10px;
      height: 10px;
      color: white;
    }

    /* Footer */
    .app-footer {
      padding: 12px 16px 20px;
      background: var(--bg-card);
      border-top: 1px solid var(--border-light);
    }

    .footer-stats {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .stats-left {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 12px;
      color: var(--text-secondary);
    }

    .stat-item {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .stat-item svg {
      width: 14px;
      height: 14px;
    }

    .stat-item.warning {
      color: var(--warning);
    }

    .stat-item.primary {
      color: var(--primary);
    }

    /* Modal Overlay */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s;
    }

    .modal-overlay.show {
      opacity: 1;
      visibility: visible;
    }

    .modal {
      background: white;
      border-radius: 28px;
      width: 320px;
      overflow: hidden;
      transform: scale(0.9) translateY(20px);
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .modal-overlay.show .modal {
      transform: scale(1) translateY(0);
    }

    /* Secret Modal */
    .modal-header {
      padding: 24px 24px 16px;
      text-align: center;
      background: linear-gradient(160deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .modal-header h3 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .modal-header p {
      font-size: 14px;
      opacity: 0.85;
    }

    .modal-body {
      padding: 24px;
    }

    .pin-display {
      display: flex;
      justify-content: center;
      gap: 16px;
      margin-bottom: 24px;
    }

    .pin-dot {
      width: 56px;
      height: 56px;
      background: var(--bg-base);
      border: 2px solid var(--border);
      border-radius: var(--radius-lg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      color: var(--text-secondary);
      transition: all 0.2s;
    }

    .pin-dot.filled {
      border-color: var(--primary);
      background: #eff6ff;
      color: var(--primary);
    }

    .pin-dot.error {
      border-color: var(--danger);
      background: #fef2f2;
      color: var(--danger);
      animation: shake 0.4s ease-in-out;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-8px); }
      40% { transform: translateX(8px); }
      60% { transform: translateX(-8px); }
      80% { transform: translateX(8px); }
    }

    .keypad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .key {
      padding: 18px;
      font-size: 22px;
      font-weight: 600;
      background: var(--bg-base);
      border: none;
      border-radius: var(--radius-lg);
      cursor: pointer;
      transition: all 0.15s;
      color: var(--text-primary);
    }

    .key:hover {
      background: var(--border-light);
    }

    .key:active {
      transform: scale(0.95);
      background: var(--border);
    }

    .key.del {
      font-size: 16px;
      color: var(--text-secondary);
    }

    .confirm-btn {
      width: 100%;
      padding: 16px;
      margin-top: 20px;
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      color: white;
      border: none;
      border-radius: var(--radius-lg);
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .confirm-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(59, 130, 246, 0.4);
    }

    .error-msg {
      color: var(--danger);
      font-size: 14px;
      margin-top: 16px;
      font-weight: 500;
      text-align: center;
    }

    /* Edit Modal */
    .edit-modal .modal-body {
      max-height: 400px;
      overflow-y: auto;
    }

    .add-form {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 20px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border-light);
    }

    .add-form input,
    .add-form select {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      font-size: 15px;
      transition: all 0.2s;
    }

    .add-form input:focus,
    .add-form select:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
    }

    .add-form-actions {
      display: flex;
      gap: 10px;
    }

    .add-form-actions button {
      flex: 1;
      padding: 14px;
      border-radius: var(--radius-md);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      border: none;
    }

    .add-btn {
      background: var(--primary);
      color: white;
    }

    .add-btn:hover {
      background: var(--primary-dark);
    }

    .cancel-btn {
      background: var(--bg-base);
      color: var(--text-secondary);
    }

    .cancel-btn:hover {
      background: var(--border-light);
      color: var(--text-primary);
    }

    .bookmark-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .bookmark-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      background: var(--bg-base);
      border-radius: var(--radius-md);
    }

    .bookmark-item .icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 700;
      color: white;
    }

    .bookmark-item .info {
      flex: 1;
      min-width: 0;
    }

    .bookmark-item .title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .bookmark-item .url {
      font-size: 12px;
      color: var(--text-tertiary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .bookmark-item .actions {
      display: flex;
      gap: 6px;
    }

    .item-btn {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all 0.2s;
      background: transparent;
    }

    .item-btn:hover {
      background: var(--bg-card);
    }

    .item-btn.hide { color: var(--warning); }
    .item-btn.delete { color: var(--danger); }

    .item-btn svg {
      width: 16px;
      height: 16px;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      padding: 14px 24px;
      background: var(--text-primary);
      color: white;
      border-radius: var(--radius-lg);
      font-size: 14px;
      font-weight: 600;
      opacity: 0;
      transition: all 0.3s;
      z-index: 200;
      box-shadow: var(--shadow-lg);
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* Tooltip */
    .tooltip {
      position: fixed;
      z-index: 1000;
      padding: 16px;
      background: var(--text-primary);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
      max-width: 260px;
      pointer-events: none;
      opacity: 0;
      transform: translateY(8px);
      transition: all 0.2s ease;
    }

    .tooltip.show {
      opacity: 1;
      transform: translateY(0);
    }

    .tooltip-title {
      font-size: 16px;
      font-weight: 700;
      color: white;
      margin-bottom: 2px;
    }

    .tooltip-url {
      font-size: 12px;
      color: #94a3b8;
      margin-bottom: 12px;
      word-break: break-all;
    }

    .tooltip-divider {
      height: 1px;
      background: rgba(255,255,255,0.1);
      margin: 12px 0;
    }

    .tooltip-desc {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .tooltip-desc-text {
      font-size: 13px;
      line-height: 1.5;
      padding: 10px 12px;
      border-radius: var(--radius-sm);
    }

    .tooltip-desc-text.en {
      color: #cbd5e1;
      background: rgba(255,255,255,0.05);
      border-left: 3px solid var(--primary);
    }

    .tooltip-desc-text.zh {
      color: white;
      background: rgba(255,255,255,0.1);
      border-left: 3px solid var(--success);
    }

    .tooltip-region {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 12px;
      padding: 8px 12px;
      font-size: 13px;
      font-weight: 600;
      border-radius: var(--radius-sm);
      background: rgba(255,255,255,0.1);
      color: #cbd5e1;
    }

    .tooltip-region.cn {
      background: rgba(220, 38, 38, 0.2);
      color: #fca5a5;
    }

    .tooltip-region.global {
      background: rgba(59, 130, 246, 0.2);
      color: #93c5fd;
    }

    .tooltip-arrow {
      position: absolute;
      bottom: -8px;
      left: 50%;
      transform: translateX(-50%);
      width: 16px;
      height: 16px;
      background: var(--text-primary);
      clip-path: polygon(50% 100%, 0 0, 100% 0);
    }

    /* Context Menu */
    .context-menu {
      position: fixed;
      background: white;
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
      padding: 8px;
      z-index: 150;
      min-width: 180px;
      opacity: 0;
      transform: scale(0.9);
      transition: all 0.15s;
    }

    .context-menu.show {
      opacity: 1;
      transform: scale(1);
    }

    .context-menu-item {
      display: flex;
      align-items: center;
      gap: 12px;

      { id: 27, title: '钉钉', url: 'https://dingtalk.com', region: 'cn', hidden: false, groupId: 'group-work', desc: { en: 'Alibaba\'s enterprise app. Communication, OA, and management tools.', zh: '阿里企业级应用，提供沟通、OA和管理工具。' }},
      { id: 28, title: '企业微信', url: 'https://work.weixin.qq.com', region: 'cn', hidden: false, groupId: 'group-work', desc: { en: 'WeChat for business. Corporate communication and customer management.', zh: '微信企业版，企业内部沟通和客户管理工具。' }},
      { id: 29, title: '语雀', url: 'https://www.yuque.com', region: 'cn', hidden: false, groupId: 'group-work', desc: { en: 'Knowledge management platform. Beautiful docs and team wikis by Alibaba.', zh: '知识管理平台，阿里出品的美观文档和团队知识库。' }},
      { id: 30, title: 'YouTube', url: 'https://youtube.com', region: 'global', hidden: false, groupId: 'group-entertainment', desc: { en: 'Video platform. Watch, create, and share videos with the world.', zh: '视频平台，与世界分享和观看视频。' }},
      { id: 31, title: 'Twitter', url: 'https://twitter.com', region: 'global', hidden: false, groupId: 'group-entertainment', desc: { en: 'Social news platform. Real-time updates, trends, and microblogging.', zh: '社交新闻平台，实时动态、趋势和微博客。' }},
      { id: 32, title: 'Reddit', url: 'https://reddit.com', region: 'global', hidden: false, groupId: 'group-entertainment', desc: { en: 'Community discussions. Forums organized by topics (subreddits) on everything.', zh: '社区讨论论坛，按主题（子版块）组织的全球社区。' }},
      { id: 33, title: 'Bilibili', url: 'https://bilibili.com', region: 'cn', hidden: false, groupId: 'group-entertainment', desc: { en: 'Chinese video site. Anime, gaming, and creative content with danmu culture.', zh: '中国视频网站，动漫、游戏和创意内容，弹幕文化发源地。' }},
      { id: 34, title: '微博', url: 'https://weibo.com', region: 'cn', hidden: false, groupId: 'group-entertainment', desc: { en: 'Chinese microblogging. Social media for news, entertainment, and trends.', zh: '中国微博客平台，社交媒体与新闻热点聚集地。' }},
      { id: 35, title: '知乎', url: 'https://zhihu.com', region: 'cn', hidden: false, groupId: 'group-entertainment', desc: { en: 'Chinese Q&A platform. In-depth discussions on knowledge, opinions, and experiences.', zh: '中文问答社区，深入讨论知识、观点和经验。' }},
      { id: 36, title: '小红书', url: 'https://xiaohongshu.com', region: 'cn', hidden: false, groupId: 'group-entertainment', desc: { en: 'Lifestyle platform. Shopping tips, travel guides, and user-generated content.', zh: '生活方式分享平台，购物攻略、旅行指南和UGC内容。' }},
      { id: 37, title: 'Spotify', url: 'https://spotify.com', region: 'global', hidden: false, groupId: 'group-entertainment', desc: { en: 'Music streaming service. Millions of songs, podcasts, and personalized playlists.', zh: '音乐流媒体服务，数百万首歌曲、播客和个性化播放列表。' }},
      { id: 38, title: '银行', url: 'https://icbc.com.cn', region: 'cn', hidden: true, groupId: 'group-work', desc: { en: 'Industrial and Commercial Bank of China. Largest state-owned commercial bank.', zh: '中国工商银行，国内最大的国有商业银行。' }},
      { id: 39, title: '证券', url: 'https://eastmoney.com', region: 'cn', hidden: true, groupId: 'group-work', desc: { en: 'East Money Securities. Financial information and stock trading platform.', zh: '东方财富证券，金融信息和股票交易平台。' }},
      { id: 40, title: '内部系统', url: 'https://internal.company.com', region: 'cn', hidden: true, groupId: 'group-dev', desc: { en: 'Internal company system. Confidential access only.', zh: '公司内部系统，仅限内部员工访问。' }},
    ];

    // State
    let currentGroup = 'all';
    let isRevealMode = false;
    let isEditMode = false;
    let pin = '';
    let langPref = 'auto';
    let contextMenuTarget = null;
    const SECRET_CODE = '000';

    // DOM Elements
    const bookmarkGrid = document.getElementById('bookmarkGrid');
    const searchInput = document.getElementById('searchInput');
    const secretModal = document.getElementById('secretModal');
    const editModal = document.getElementById('editModal');
    const revealBtn = document.getElementById('revealBtn');
    const editBtn = document.getElementById('editBtn');
    const toast = document.getElementById('toast');
    const revealBadge = document.getElementById('revealBadge');
    const hiddenCount = document.getElementById('hiddenCount');
    const bookmarkCount = document.getElementById('bookmarkCount');
    const tooltip = document.getElementById('tooltip');
    const contextMenu = document.getElementById('contextMenu');
    const bookmarkList = document.getElementById('bookmarkList');

    // Detect system language
    const isSystemZh = navigator.language.startsWith('zh');

    function getEffectiveLang() {
      if (langPref === 'auto') return isSystemZh;
      return langPref === 'zh';
    }

    // Language toggle
    document.querySelectorAll('.lang-toggle button').forEach(btn => {
      btn.addEventListener('click', () => {
        langPref = btn.dataset.lang;
        document.querySelectorAll('.lang-toggle button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render();
      });
    });

    // Update category counts
    function updateCategoryCounts() {
      document.getElementById('countAll').textContent = bookmarks.filter(b => !b.hidden).length;
      document.getElementById('countAI').textContent = bookmarks.filter(b => b.groupId === 'group-ai' && !b.hidden).length;
      document.getElementById('countDev').textContent = bookmarks.filter(b => b.groupId === 'group-dev' && !b.hidden).length;
      document.getElementById('countDesign').textContent = bookmarks.filter(b => b.groupId === 'group-design' && !b.hidden).length;
      document.getElementById('countWork').textContent = bookmarks.filter(b => b.groupId === 'group-work' && !b.hidden).length;
      document.getElementById('countEntertainment').textContent = bookmarks.filter(b => b.groupId === 'group-entertainment' && !b.hidden).length;
    }

    // Category switching
    document.querySelectorAll('.category-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.category-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        currentGroup = tab.dataset.group;
        render();
      });
    });

    // Render bookmarks
    function render() {
      let filtered = bookmarks;

      if (currentGroup !== 'all') {
        filtered = filtered.filter(b => b.groupId === currentGroup);
      }

      const query = searchInput.value.toLowerCase();
      if (query) {
        filtered = filtered.filter(b =>
          b.title.toLowerCase().includes(query) ||
          b.url.toLowerCase().includes(query)
        );
      }

      if (!isRevealMode) {
        filtered = filtered.filter(b => !b.hidden);
      }

      bookmarkGrid.innerHTML = filtered.map(b => `
        <div class="bookmark-card ${b.hidden ? 'hidden' : ''}" data-id="${b.id}">
          <div class="lock-indicator">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
            </svg>
          </div>
          <div class="bookmark-icon" style="background: ${getGradient(b.id)}">
            <span>${b.title.charAt(0)}</span>
          </div>
          <div class="bookmark-title">${b.title}</div>
          <div class="bookmark-region">${b.region === 'cn' ? '🇨🇳' : '🌍'}</div>
        </div>
      `).join('');

      // Event listeners
      bookmarkGrid.querySelectorAll('.bookmark-card').forEach(card => {
        card.addEventListener('mouseenter', showTooltip);
        card.addEventListener('mousemove', moveTooltip);
        card.addEventListener('mouseleave', hideTooltip);
        card.addEventListener('contextmenu', showContextMenu);
        card.addEventListener('click', handleCardClick);
      });

      // Update stats
      const visibleCount = bookmarks.filter(b => !b.hidden).length;
      const hiddenItemsCount = bookmarks.filter(b => b.hidden).length;
      bookmarkCount.innerHTML = `
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z"/>
        </svg>
        ${visibleCount} 个书签
      `;

      if (!isRevealMode && hiddenItemsCount > 0) {
        hiddenCount.style.display = 'flex';
        document.getElementById('hiddenNum').textContent = hiddenItemsCount;
      } else {
        hiddenCount.style.display = 'none';
      }

      revealBadge.style.display = isRevealMode ? 'inline-flex' : 'none';
      updateCategoryCounts();
    }

    function handleCardClick(e) {
      if (e.button === 0 && !isEditMode) {
        const card = e.currentTarget;
        const id = parseInt(card.dataset.id);
        const bookmark = bookmarks.find(b => b.id === id);
        if (bookmark) {
          window.open(bookmark.url, '_blank');
        }
      }
    }

    // Context Menu
    function showContextMenu(e) {
      e.preventDefault();
      const card = e.currentTarget;
      const id = parseInt(card.dataset.id);
      contextMenuTarget = bookmarks.find(b => b.id === id);

      const hideText = contextMenu.querySelector('.context-hide-text');
      hideText.textContent = contextMenuTarget.hidden ? '显示书签' : '隐藏书签';

      contextMenu.style.left = e.clientX + 'px';
      contextMenu.style.top = e.clientY + 'px';
      contextMenu.classList.add('show');

      const rect = contextMenu.getBoundingClientRect();
      if (rect.right > window.innerWidth) {
        contextMenu.style.left = (e.clientX - rect.width) + 'px';
      }
      if (rect.bottom > window.innerHeight) {
        contextMenu.style.top = (e.clientY - rect.height) + 'px';
      }
    }

    function hideContextMenu() {
      contextMenu.classList.remove('show');
      contextMenuTarget = null;
    }

    document.addEventListener('click', (e) => {
      if (!contextMenu.contains(e.target)) {
        hideContextMenu();
      }
    });

    contextMenu.querySelectorAll('.context-menu-item').forEach(item => {
      item.addEventListener('click', () => {
        const action = item.dataset.action;
        if (!contextMenuTarget) return;

        if (action === 'open') {
          window.open(contextMenuTarget.url, '_blank');
        } else if (action === 'toggle-hide') {
          const bookmark = bookmarks.find(b => b.id === contextMenuTarget.id);
          if (bookmark) {
            bookmark.hidden = !bookmark.hidden;
            showToast(bookmark.hidden ? '已隐藏' : '已显示');
            render();
          }
        } else if (action === 'delete') {
          const index = bookmarks.findIndex(b => b.id === contextMenuTarget.id);
          if (index > -1) {
            bookmarks.splice(index, 1);
            showToast('已删除');
            render();
          }
        }
        hideContextMenu();
      });
    });

    // Search
    searchInput.addEventListener('input', render);

    // Open secret modal
    revealBtn.addEventListener('click', () => {
      secretModal.classList.add('show');
      pin = '';
      updatePinDisplay();
    });

    // Keypad
    document.querySelectorAll('.key').forEach(key => {
      key.addEventListener('click', () => {
        const k = key.dataset.key;
        if (k === 'del') {
          pin = pin.slice(0, -1);
        } else if (k && pin.length < 3) {
          pin += k;
        }
        updatePinDisplay();
      });
    });

    function updatePinDisplay() {
      for (let i = 0; i < 3; i++) {
        const dot = document.getElementById(`pin${i}`);
        dot.textContent = pin.length > i ? '●' : '';
        dot.classList.remove('filled', 'error');
        if (pin.length > i) {
          dot.classList.add('filled');
        }
      }
      document.getElementById('pinError').style.display = 'none';
    }

    // Confirm PIN
    document.getElementById('confirmPin').addEventListener('click', () => {
      if (pin === SECRET_CODE) {
        isRevealMode = true;
        secretModal.classList.remove('show');
        pin = '';
        render();
        showToast('全量模式已开启');
      } else {
        document.querySelectorAll('.pin-dot').forEach(d => d.classList.add('error'));
        document.getElementById('pinError').style.display = 'block';
        setTimeout(() => {
          pin = '';
          updatePinDisplay();
        }, 500);
      }
    });

    // Edit mode
    editBtn.addEventListener('click', () => {
      isEditMode = !isEditMode;
      editBtn.classList.toggle('primary', !isEditMode);
      if (isEditMode) {
        renderBookmarkList();
        editModal.classList.add('show');
      }
    });

    document.getElementById('cancelAdd').addEventListener('click', () => {
      document.getElementById('newTitle').value = '';
      document.getElementById('newUrl').value = '';
    });

    // Close edit modal
    editModal.addEventListener('click', (e) => {
      if (e.target === editModal) {
        isEditMode = false;
        editBtn.classList.add('primary');
        editModal.classList.remove('show');
      }
    });

    // Render bookmark list
    function renderBookmarkList() {
      bookmarkList.innerHTML = bookmarks.map(b => `
        <div class="bookmark-item" data-id="${b.id}">
          <div class="icon" style="background: ${getGradient(b.id)}">${b.title.charAt(0)}</div>
          <div class="info">
            <div class="title">${b.title}</div>
            <div class="url">${b.url.replace('https://', '')}</div>
          </div>
          <div class="actions">
            <button class="item-btn hide" data-action="toggle-hide" title="${b.hidden ? '显示' : '隐藏'}">
              <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242"/>
              </svg>
            </button>
            <button class="item-btn delete" data-action="delete" title="删除">
              <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
              </svg>
            </button>
          </div>
        </div>
      `).join('');

      bookmarkList.querySelectorAll('.item-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const item = btn.closest('.bookmark-item');
          const id = parseInt(item.dataset.id);
          const action = btn.dataset.action;

          if (action === 'toggle-hide') {
            const bookmark = bookmarks.find(b => b.id === id);
            if (bookmark) {
              bookmark.hidden = !bookmark.hidden;
              renderBookmarkList();
              render();
              showToast(bookmark.hidden ? '已隐藏' : '已显示');
            }
          } else if (action === 'delete') {
            const index = bookmarks.findIndex(b => b.id === id);
            if (index > -1) {
              bookmarks.splice(index, 1);
              renderBookmarkList();
              render();
              showToast('已删除');
            }
          }
        });
      });
    }

    // Add bookmark
    document.getElementById('addBookmark').addEventListener('click', () => {
      const title = document.getElementById('newTitle').value.trim();
      const url = document.getElementById('newUrl').value.trim();
      const group = document.getElementById('newGroup').value;

      if (!title || !url) {
        showToast('请填写标题和网址');
        return;
      }

      const newId = Math.max(...bookmarks.map(b => b.id)) + 1;
      const normalizedUrl = url.startsWith('http') ? url : 'https://' + url;
      bookmarks.push({
        id: newId,
        title,
        url: normalizedUrl,
        region: url.includes('.cn') ? 'cn' : 'global',
        hidden: false,
        groupId: group,
        desc: { en: '', zh: '' }
      });

      document.getElementById('newTitle').value = '';
      document.getElementById('newUrl').value = '';
      renderBookmarkList();
      render();
      showToast('书签添加成功');
    });

    // Toast
    function showToast(msg) {
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }

    // Tooltip
    function showTooltip(e) {
      const card = e.currentTarget;
      const id = parseInt(card.dataset.id);
      const bookmark = bookmarks.find(b => b.id === id);
      if (!bookmark || !bookmark.desc) return;

      document.getElementById('tooltipTitle').textContent = bookmark.title;
      document.getElementById('tooltipUrl').textContent = bookmark.url.replace('https://', '');

      const effectiveLang = getEffectiveLang();
      const tooltipEn = document.getElementById('tooltipEn');
      const tooltipZh = document.getElementById('tooltipZh');

      tooltipEn.textContent = bookmark.desc.en;
      tooltipZh.textContent = bookmark.desc.zh;

      if (effectiveLang) {
        tooltipEn.style.display = 'block';
        tooltipZh.style.display = 'block';
      } else {
        tooltipEn.style.display = 'block';
        tooltipZh.style.display = 'none';
      }

      const tooltipRegion = document.getElementById('tooltipRegion');
      if (bookmark.region === 'cn') {
        tooltipRegion.className = 'tooltip-region cn';
        document.getElementById('tooltipRegionIcon').textContent = '🇨🇳';
        document.getElementById('tooltipRegionText').textContent = '中国服务';
      } else {
        tooltipRegion.className = 'tooltip-region global';
        document.getElementById('tooltipRegionIcon').textContent = '🌍';
        document.getElementById('tooltipRegionText').textContent = '全球服务';
      }

      tooltip.classList.add('show');
      moveTooltip(e);
    }

    function moveTooltip(e) {
      const tooltipRect = tooltip.getBoundingClientRect();
      let left = e.clientX - tooltipRect.width / 2;
      let top = e.clientY - tooltipRect.height - 15;

      const padding = 10;
      if (left < padding) left = padding;
      if (left + tooltipRect.width > window.innerWidth - padding) {
        left = window.innerWidth - tooltipRect.width - padding;
      }
      if (top < padding) {
        top = e.clientY + 25;
      }

      tooltip.style.left = left + 'px';
      tooltip.style.top = top + 'px';
    }

    function hideTooltip() {
      tooltip.classList.remove('show');
    }

    // Initialize
    updateCategoryCounts();
    render();
  </script>
</body>
</html>
